<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- head 안에 <style> 태그를 사용해서 css 작성방법 -->
<style>
    h1{color: blue;}
</style>
</head>
<body>
    <h1>제목</h1>
    <p style="color: red;font-size: 20px;">인라인스타일 예제</p>
    <!-- html 요소의 style 속성을 직접 css로 작성방법 -->
</body>
</html>
