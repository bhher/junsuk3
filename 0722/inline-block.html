<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
*{margin: 0;padding: 0;} 
.container{
    padding: 10px;
    width: 1050px;
    border:1px solid #333;
    margin-left: auto;
    margin-right: auto;
}   
.box{
    padding-top: 10px;
    width: 330px;
    height: 260px;
    border: 1px solid #333;
    text-align: center;
    display: inline-block;
}
.box img{
    width: 300px;
    height:200px;
    border-radius: 5px;
    /* 모서리 둥글게 */
}
.text1 .p1{
    font-weight: bold;
    padding-bottom: 7px;
}
.text1 .p2{
    font-size: 12px;
}
.text1 .p2 span{
    padding: 3px;
    margin-right: 10px;
    background-color: pink;
    color: hotpink;
    font-weight: bold;
}
</style>

</head>
<body>
    <div class="container">
        <div class="box box1">
            <img src="images/dog1.jpg" alt="dog1">
            <div class="text1">
                <p class="p1">시바견 분양합니다.</p>
                <p class="p2"><span>무료분양</span> 시바견</p>
            </div>
        </div>
        <div class="box box2">
            <img src="images/dog2.jpg" alt="dog2">
            <div class="text1">
                <p class="p1">포메 분양합니다.</p>
                <p class="p2"><span>무료분양</span> 포메라니안</p>
            </div>
        </div>
        <div class="box box3">
            <img src="images/dog3.jpg" alt="dog3">
            <div class="text1">
                <p class="p1">말티즈 분양합니다.</p>
                <p class="p2"><span>무료분양</span> 맢티즈</p>
            </div>
        </div>
    </div>
</body>
</html>
