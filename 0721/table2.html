<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
table{
    border: 1px solid #000;
    border-collapse: collapse;
    /* 두개선을 하나로 합침 */
}

td{
     border: 1px solid #000;
     /* padding: 10px; */
     /* 안여백 : 위 오른쪽 아래 왼쪽 10px */
     padding: 10px 100px;

}

</style>
</head>
<body>
    
     <table>
        <caption>표제목(캡션)</caption>
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
        </tr>
        <tr>
            <td>2행 1열</td>
            <td>2행 2열</td>
        </tr>
    </table>
</body>
</html>
