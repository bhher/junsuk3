<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <p>오늘은 두번째 날 입니다.</p>
    <h1>Html 기본구조 예제</h1>

    <h3>★ 특수문자 가능 ㄱ~ㅎ 존재</h3>
    <h3> 또다른 특수문자는 엔티티코드 라고 구글에 검색(html 특수문자) </h3>
    <p>html에            띄어쓰기  스페이스바는 한 개만 적용</p>
    <p>html에  nbsp 쓰니 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 되네   </p>
    <h4> &lt;!DOCTYPE html&gt; html5 문서에 무조건쓴다.  </h4>
    <img src="images/entity.png" alt="엔티티코드표">
    <h5>이모지 넣는 방법은 win키 + '.'  ⚽⚾🎴🎵📌</h5>

    <!-- 사용자 정의 목록 -->
    <dl>
        <dt>말티즈</dt>
        <dd>사랑스럽고 시기심 많은 강아지</dd>
        <dt>요크셔테리어</dt>
        <dd>용맹하고 애교많은 강아지</dd>
    </dl>


    <!-- 블럭요소
    1. 한 줄 전체를 차지한다.
    2.대표적인 블럭요소: div, p, h1~h6, ul, ol, li, pre, blockquote, address ,dl,dt,dd
    3. 항상 줄바꿈이 발생
    4. 넓이(width) 높이(height) 설정가능
    5. margin(바깥여백), padding(안여백) 설정가능
    6. 블럭요소 안에 인라인 요소 포함 가능 (블럭요소도 포함가능)
    7. 레이아웃 구성에 주로 사용
    -->

</html>
