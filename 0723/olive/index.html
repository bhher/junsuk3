<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>올리브영랭킹</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="box box1">
            <img src="images/olive1.jpg" alt="올리브1">
            <div class="text">
                <p class="p1"><strong>퍼셀</strong></p>
                <p class="p2">
                    [7/23하루특가/대용량] 퍼셀 20억/mL<br/>픽셀바이옴 원액 55ml
                </p>
                <p class="p3">
                    <span class="s1"><del>59,000원</del></span>
                    <span class="s2">35,900원</span>
                </p>
                <p class="p4">
                    <span class="sale">세일</span>
                    <span class="coupon">쿠폰</span>
                  
                    <span class="today">오늘드림</span>
                </p>
            </div>
        </div>
          <div class="box box2">
            <img src="images/olive2.jpg" alt="올리브2">
            <div class="text">
                <p class="p1"><strong>가히</strong></p>
                <p class="p2">
                    [보송밀착/2개구성] 가히 에어리 핏 <br/>선스틱 더블 기획(14g+14g)
                </p>
                <p class="p3">
                    <span class="s1"><del>36,000원</del></span>
                    <span class="s2">27,400원</span>
                </p>
                <p class="p4">
                    <span class="sale">세일</span>
                  
                    <span class="today">오늘드림</span>
                </p>
            </div>
        </div>
        <div class="box box3">
            <img src="images/olive3.jpg" alt="올리브3">
            <div class="text">
                <p class="p1"><strong>프로티원</strong></p>
                <p class="p2">
                    [7/23 단 하루 특가/신제품] 프로티원<br/> 단백질쉐이크 대용량 490g x 2통 7종
                </p>
                <p class="p3">
                    <span class="s1"><del>56,900원</del></span>
                    <span class="s2">43,900원</span>
                </p>
                <p class="p4">
                 
                    <span class="coupon">쿠폰</span>
                  
                </p>
            </div>
        </div>
        <div class="box box4">
            <img src="images/olive4.jpg" alt="올리브4">
            <div class="text">
                <p class="p1"><strong>메디힐</strong></p>
                <p class="p2">
                    [15년 연속 1위] 메디힐 에센셜 <br/>마스크팩 10/10+1매 기획 7종...
                </p>
                <p class="p3">
                    <span class="s1"><del>20,000원</del></span>
                    <span class="s2">10,000원</span>
                </p>
                <p class="p4">
                    <span class="sale">세일</span>
                 
                    <span class="today">오늘드림</span>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
